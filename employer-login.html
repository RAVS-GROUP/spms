<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

Employer Login

</title>

<link rel="stylesheet"

href="css/style.css">

</head>

<body>

<header class="header">

<div class="container navbar">

<a href="index.html"

class="logo">

UCPP

</a>

</div>

</header>

<main class="container">

<div class="profile-card">

<h2>

Employer Login

</h2>

<p>

Login to Employer Dashboard

</p>

<br>

<div class="form-group">

<label>

Email

</label>

<input

type="email"

id="email"

class="form-control">

</div>

<div class="form-group">

<label>

Password

</label>

<input

type="password"

id="password"

class="form-control">

</div>

<br>

<button

class="btn-primary"

onclick="loginEmployer()">

Login

</button>

</div>

</main>

<script src="api/config.js"></script>

<script src="js/app.js"></script>

<script src="js/employer-login.js"></script>

</body>

</html>
