<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | Udayan Care Placement Portal</title>

<link rel="icon" href="images/favicon.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ===========================
HEADER
============================ -->

<header class="header">

    <div class="container header-container">

        <div class="logo-section">

            <img
                src="images/logo.png"
                class="logo"
                alt="Udayan Care">

            <div>

                <h2>Udayan Care Placement Portal</h2>

                <p>
                    Making Young Lives Shine Through Employment
                </p>

            </div>

        </div>

        <nav>

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="jobs.html">
                Jobs
            </a>

            <a href="applications.html">
                Applications
            </a>

            <button
                id="logoutBtn"
                class="btn-danger">

                Logout

            </button>

        </nav>

    </div>

</header>

<!-- ===========================
PROFILE HEADER
============================ -->

<section class="profile-banner">

    <div class="container">

        <h1>

            My Profile

        </h1>

        <p>

            Keep your profile updated to improve your placement opportunities.

        </p>

    </div>

</section>

<!-- ===========================
PROFILE CONTENT
============================ -->

<main class="container">

    <!-- Profile Completion -->

    <section class="profile-completion-card">

        <div class="completion-top">

            <h3>

                Profile Completion

            </h3>

            <span id="profilePercentage">

                0%

            </span>

        </div>

        <div class="progress">

            <div
                id="profileProgressBar"
                class="progress-fill">

            </div>

        </div>

    </section>

    <!-- Profile Form -->

    <form
        id="profileForm"
        class="profile-card">

        <!-- Next Parts -->

    </form>

</main>

<!-- ===========================
FOOTER
============================ -->

<footer>

    © 2026 Udayan Care Placement Portal

</footer>

<script src="js/config.js"></script>

<script src="js/app.js"></script>

<script src="js/profile.js"></script>

</body>

</html>
